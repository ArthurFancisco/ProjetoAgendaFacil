services:
  postgres:
    image: postgres:16-alpine
    container_name: agendafacil-postgres
    environment:
      POSTGRES_DB: agendafacil
      POSTGRES_USER: agendafacil
      POSTGRES_PASSWORD: agendafacil123
    ports:
      - "5432:5432"
    volumes:
      - agendafacil_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agendafacil -d agendafacil"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agendafacil_pgdata:
