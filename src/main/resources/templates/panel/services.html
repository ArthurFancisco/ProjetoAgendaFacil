<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Serviços - AgendaFácil Pro</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="panel-layout">
    <aside class="sidebar">
        <h2>AgendaFácil</h2>
        <a th:href="@{/painel}">Agenda</a>
        <a th:href="@{/painel/servicos}">Serviços</a>
        <a th:href="@{/painel/profissionais}">Profissionais</a>
        <a th:href="@{/painel/bloqueios}">Bloqueios</a>
        <form th:action="@{/logout}" method="post" style="margin-top:16px"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="btn danger full" type="submit">Sair</button></form>
    </aside>
    <main class="content">
        <h1>Serviços</h1>
        <p class="muted">Cadastre preço, duração e intervalo. Serviços longos podem exigir aprovação manual.</p>
        <div class="grid">
            <section class="col-5 card">
                <h2>Novo serviço</h2>
                <form th:action="@{/painel/servicos}" th:object="${form}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="field"><label>Nome</label><input th:field="*{name}" required placeholder="Corte masculino"></div>
                    <div class="field"><label>Descrição</label><textarea th:field="*{description}" placeholder="Descrição curta"></textarea></div>
                    <div class="field"><label>Preço</label><input th:field="*{price}" type="number" step="0.01" min="0" required></div>
                    <div class="field"><label>Duração em minutos</label><input th:field="*{durationMinutes}" type="number" min="5" max="600" required></div>
                    <div class="field"><label>Intervalo depois do serviço</label><input th:field="*{bufferMinutes}" type="number" min="0" max="120"></div>
                    <label class="row"><input th:field="*{requiresManualApproval}" type="checkbox" style="width:auto;min-height:auto"> Exigir aprovação manual</label>
                    <button class="btn full" type="submit">Cadastrar serviço</button>
                </form>
            </section>
            <section class="col-7 card">
                <h2>Serviços ativos</h2>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Serviço</th><th>Preço</th><th>Duração</th><th>Segurança</th><th>Ação</th></tr></thead>
                        <tbody>
                        <tr th:each="service : ${services}">
                            <td><strong th:text="${service.name}">Serviço</strong><br><span class="muted" th:text="${service.description}"></span></td>
                            <td th:text="|R$ ${#numbers.formatDecimal(service.price, 1, 2, 'COMMA')}|">R$ 35,00</td>
                            <td th:text="|${service.durationMinutes} min + ${service.bufferMinutes} min|">30 min</td>
                            <td><span class="badge" th:text="${service.requiresManualApproval ? 'Aprovação manual' : 'Normal'}">Normal</span></td>
                            <td>
                                <form th:action="@{/painel/servicos/{id}/inativar(id=${service.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn danger" type="submit">Inativar</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(services)}"><td colspan="5">Nenhum serviço cadastrado.</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
</div>
</body>
</html>
