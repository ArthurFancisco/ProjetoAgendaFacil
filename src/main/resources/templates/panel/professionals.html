<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profissionais - AgendaFácil Pro</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="panel-layout">
    <aside class="sidebar">
        <h2>AgendaFácil</h2>
        <a th:href="@{/painel}">Agenda</a>
        <a th:href="@{/painel/servicos}">Serviços</a>
        <a th:href="@{/painel/profissionais}">Profissionais</a>
        <a th:href="@{/painel/bloqueios}">Bloqueios</a>
        <form th:action="@{/logout}" method="post" style="margin-top:16px"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="btn danger full" type="submit">Sair</button></form>
    </aside>
    <main class="content">
        <h1>Profissionais</h1>
        <p class="muted">Vincule cada profissional aos serviços que ele realmente realiza.</p>
        <div class="grid">
            <section class="col-5 card">
                <h2>Novo profissional</h2>
                <form th:action="@{/painel/profissionais}" th:object="${form}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="field"><label>Nome</label><input th:field="*{name}" required placeholder="João"></div>
                    <div class="field"><label>Telefone</label><input th:field="*{phone}" data-phone placeholder="(17) 99999-9999"></div>
                    <div class="field">
                        <label>Serviços</label>
                        <div class="stack">
                            <label class="row" th:each="service : ${services}">
                                <input type="checkbox" th:field="*{serviceIds}" th:value="${service.id}" style="width:auto;min-height:auto">
                                <span th:text="${service.name}">Corte</span>
                            </label>
                        </div>
                    </div>
                    <button class="btn full" type="submit">Cadastrar profissional</button>
                </form>
            </section>
            <section class="col-7 card">
                <h2>Profissionais ativos</h2>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Nome</th><th>Telefone</th><th>Serviços</th><th>Ação</th></tr></thead>
                        <tbody>
                        <tr th:each="professional : ${professionals}">
                            <td><strong th:text="${professional.name}">João</strong></td>
                            <td th:text="${professional.phone}">Telefone</td>
                            <td><span class="badge" th:each="service : ${professional.services}" th:text="${service.name}" style="margin:2px">Corte</span></td>
                            <td>
                                <form th:action="@{/painel/profissionais/{id}/inativar(id=${professional.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn danger" type="submit">Inativar</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(professionals)}"><td colspan="4">Nenhum profissional cadastrado.</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
