spring:
  application:
    name: agendafacil-pro
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agendafacil}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postdba}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
  thymeleaf:
    cache: false
  web:
    resources:
      cache:
        period: 7d

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  error:
    whitelabel:
      enabled: false
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
  servlet:
    session:
      timeout: 45m
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  security:
    hash-secret: ${APP_HASH_SECRET:troque-este-segredo-em-producao}
    max-login-attempts: ${APP_MAX_LOGIN_ATTEMPTS:5}
    lockout-minutes: ${APP_LOCKOUT_MINUTES:15}
  booking:
    temporary-hold-minutes: ${APP_TEMP_HOLD_MINUTES:10}
    max-attempts-phone-hour: ${APP_MAX_ATTEMPTS_PHONE_HOUR:5}
    max-attempts-ip-hour: ${APP_MAX_ATTEMPTS_IP_HOUR:20}
    max-future-appointments-phone: ${APP_MAX_FUTURE_BY_PHONE:2}
    slot-step-minutes: ${APP_SLOT_STEP_MINUTES:15}
